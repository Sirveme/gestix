<header class="topbar">
    <button class="sidebar-toggle" onclick="document.getElementById('sidebar').classList.toggle('collapsed')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
    </button>
    <div class="topbar-empresa">
        <span class="empresa-chip">{{ request.state.empresa_nombre if request.state.empresa_nombre else '' }}</span>
    </div>
    <div class="topbar-right">
        <button class="topbar-btn" title="Consulta por voz (próximamente)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/>
                <path d="M19 10v2a7 7 0 01-14 0v-2"/>
                <line x1="12" y1="19" x2="12" y2="23"/>
                <line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
        </button>
        <div class="topbar-user">
            <span>{{ request.state.nombre if request.state.nombre else '' }}</span>
            <div class="user-avatar">{{ (request.state.nombre[0] | upper) if request.state.nombre else 'U' }}</div>
        </div>
    </div>
</header>
